version: 0.2

env:
  variables:
    TF_VERSION: "1.12.2"
    TF_IN_AUTOMATION: "true"

phases:
  install:
    commands:
      - echo "Installing Terraform ${TF_VERSION}"
      - curl -fsSLo terraform.zip "https://releases.hashicorp.com/terraform/${TF_VERSION}/terraform_${TF_VERSION}_linux_amd64.zip"
      - unzip -o terraform.zip
      - install terraform /usr/local/bin/terraform
      - terraform version

  pre_build:
    commands:
      - echo "Initializing Terraform"
      - terraform init -input=false

  build:
    commands:
      - echo "Applying previously generated Terraform plan"
      - terraform apply
        -input=false
        -lock-timeout=5m
        -auto-approve
        tfplan

  post_build:
    commands:
      - terraform output
      - echo "Terraform apply completed"
