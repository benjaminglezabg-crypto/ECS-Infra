version: 0.2

env:
  variables:
    TF_VERSION: "1.12.2"
    TF_IN_AUTOMATION: "true"

phases:
  install:
    commands:
      - echo "Installing Terraform ${TF_VERSION}"
      - curl -fsSLo terraform.zip "https://releases.hashicorp.com/terraform/${TF_VERSION}/terraform_${TF_VERSION}_linux_amd64.zip"
      - unzip -o terraform.zip
      - install terraform /usr/local/bin/terraform
      - terraform version

  pre_build:
    commands:
      - echo "Initializing Terraform"
      - terraform init -input=false
      - echo "Reviewing resources currently managed by Terraform"
      - terraform state list

  build:
    commands:
      - echo "Destroying Terraform infrastructure"
      - terraform destroy -input=false -lock-timeout=5m -auto-approve

  post_build:
    commands:
      - echo "Terraform destroy completed"
